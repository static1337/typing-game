<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZType Space Shooter Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Start Screen / Difficulty Menu -->
        <div id="start-screen">
            <h1>Z-TYPE</h1>
            <p>Select Difficulty to Start</p>
            <div class="menu-buttons">
                <button class="menu-btn" data-diff="easy">EASY</button>
                <button class="menu-btn" data-diff="medium">MEDIUM</button>
                <button class="menu-btn" data-diff="hard">HARD</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="game-over-screen" class="hidden">
    <h1>GAME OVER</h1>
    <p>Your Score: <span id="final-score">0</span></p>
    
    <!-- LEADERBOARD CONTAINER -->
    <div class="leaderboard-box">
        <h3>Local High Scores</h3>
        <ol id="score-list" class="score-list"></ol>
    </div>
    
    <button id="restart-btn">Play Again</button>
</div>
